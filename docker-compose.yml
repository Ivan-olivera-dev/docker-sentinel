version: '3.8'

services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-socket-proxy
    environment:
      - CONTAINERS=1
      - POST=1
      - EVENTS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  sentinel:
    build: .
    container_name: docker-sentinel
    restart: unless-stopped
    depends_on:
      - docker-proxy
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
    env_file:
      - .env

  # ==========================================
  # CONTENEDOR DE PRUEBA (Para testear el Auto-Healer)
  # ==========================================
  test-app:
    image: nginx:alpine
    container_name: sentinel-test-app
    # IMPORTANTE: Esta es la etiqueta mágica. 
    # Solo los contenedores que la tengan serán revividos.
    labels:
      - "sentinel.enable=true"
